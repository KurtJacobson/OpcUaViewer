name: Build Installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git describe can find tags

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $exactTag = try { git describe --tags --exact-match HEAD 2>$null } catch { $null }
          $shortHash = git rev-parse --short HEAD
          if ($exactTag) {
            $version = $exactTag -replace '^v', ''
          } else {
            $nearestTag = try { git describe --tags --abbrev=0 HEAD 2>$null } catch { $null }
            $base = if ($nearestTag) { $nearestTag -replace '^v', '' } else { '1.0.0' }
            $version = "$base-$shortHash"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Publish app
        run: |
          dotnet publish OpcUaViewer/OpcUaViewer.csproj `
            -c Release -r win-x64 --self-contained `
            -o OpcUaViewer/publish

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" `
            "/DMyAppVersion=${{ steps.version.outputs.version }}" `
            OpcUaViewer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpcUaViewer-Setup-${{ steps.version.outputs.version }}
          path: installer/OpcUaViewer-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/OpcUaViewer-Setup.exe
          name: OPC UA Viewer ${{ steps.version.outputs.version }}
          generate_release_notes: true
