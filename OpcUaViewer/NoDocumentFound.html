<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>No document</title>
<style>
    html, body {
        margin: 0;
        height: 100%;
        background: #f3f3f3;
        font-family: Segoe UI, Tahoma, Arial, sans-serif;
    }

    .wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
    }

    .card {
        max-width: 520px;
        padding: 28px 32px;
        background: #ffffff;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        text-align: center;
    }

    .icon {
        font-size: 40px;
        margin-bottom: 8px;
    }

    h1 {
        margin: 0 0 8px;
        font-size: 16px;
        color: #333;
    }

    p {
        margin: 0;
        font-size: 13px;
        color: #666;
        word-break: break-word;
    }
</style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="icon">&#128196;</div>
            <h1>No document to display</h1>
            <p>{{MESSAGE}}</p>
        </div>
    </div>
</body>
</html>
