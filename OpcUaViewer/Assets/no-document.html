<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #181818;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    user-select: none;
    overflow: hidden;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    max-width: 480px;
    text-align: center;
    padding: 40px;
  }
  .icon {
    width: 72px;
    height: 72px;
    opacity: 0.3;
  }
  .message {
    font-size: 15px;
    line-height: 1.7;
    color: #787878;
  }
</style>
</head>
<body>
<div class="card">
  <svg class="icon" viewBox="0 0 24 24" fill="none"
       stroke="#FF8C00" stroke-width="1.4"
       stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/>
    <line x1="12" y1="12" x2="12" y2="16"/>
    <circle cx="12" cy="10" r="0.5" fill="#FF8C00"/>
  </svg>
  <p class="message">{{MESSAGE}}</p>
</div>
</body>
</html>
